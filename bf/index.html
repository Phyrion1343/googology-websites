<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BF 操作可视化</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --plus: #22c55e;
            --minus: #facc15;
            --bg: #eef3f8;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
            --purple: #7c3aed;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 24px 12px;
            background:
                radial-gradient(circle at top left, rgba(59,130,246,0.16), transparent 30%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
            color: var(--text);
            font-size: 14px;
        }

        .app {
            width: 100%;
            max-width: 920px;
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .title {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .title b {
            font-size: 1.35rem;
            letter-spacing: 0.02em;
        }

        .subtitle {
            font-size: 12px;
            color: var(--muted);
        }

        #status {
            color: var(--primary);
            font-weight: 700;
            font-size: 12px;
            background: #eaf2ff;
            border: 1px solid #d8e8ff;
            padding: 6px 12px;
            border-radius: 999px;
            white-space: nowrap;
        }

        .box {
            background: rgba(255,255,255,0.92);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            margin-bottom: 14px;
            backdrop-filter: blur(8px);
        }

        #editor {
            width: 100%;
            height: 92px;
            font-family: Consolas, Monaco, monospace;
            font-size: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            resize: vertical;
            outline: none;
            background: #fbfdff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #editor:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59,130,246,0.12);
        }

        #display {
            display: none;
            width: 100%;
            min-height: 92px;
            font-family: Consolas, Monaco, monospace;
            font-size: 18px;
            border: 2px solid var(--primary);
            border-radius: 12px;
            padding: 12px;
            background: #fff;
            word-break: break-all;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .char {
            display: inline-block;
            min-width: 12px;
            text-align: center;
            color: #9ca3af;
            transition: 0.15s;
        }

        .active-char {
            background: #ef4444;
            color: white !important;
            border-radius: 4px;
            font-weight: bold;
            transform: scale(1.18);
        }

        #info {
            font-size: 11px;
            color: var(--muted);
            margin-top: 8px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            padding: 7px 10px;
            border-radius: 10px;
            font-size: 12px;
            color: #374151;
            white-space: nowrap;
        }

        input {
            border: 1px solid #d1d5db;
            border-radius: 7px;
            padding: 5px 7px;
            font-size: 12px;
            outline: none;
            background: white;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
        }

        button {
            padding: 9px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
            font-size: 13px;
            min-width: 96px;
            width: auto;
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
        }

        button:active {
            transform: translateY(0);
            box-shadow: none;
        }

        .btn-run {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            flex-grow: 0;
        }

        .btn-reset {
            background: #64748b;
            color: white;
        }

        .btn-seek {
            background: linear-gradient(135deg, var(--purple), #6d28d9);
            color: white;
            width: auto;
            margin-top: 0;
        }

        .seek-area {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #d1d5db;
        }

        .seek-title {
            font-size: 12px;
            color: var(--purple);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .section-title {
            font-weight: 800;
            font-size: 14px;
            margin: 16px 0 8px 4px;
            color: #111827;
        }

        .memory-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 190px;
            overflow-y: auto;
            padding: 12px;
            background: rgba(255,255,255,0.8);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: inset 0 1px 4px rgba(15,23,42,0.04);
        }

        .cell {
            width: 62px;
            height: 62px;
            background: white;
            border: 1px solid #dbe2ea;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            position: relative;
            overflow: hidden;
            transition: 0.15s;
        }

        .cell-idx {
            position: absolute;
            top: 4px;
            left: 6px;
            font-size: 9px;
            color: #a1a1aa;
        }

        .cell-val {
            font-family: Consolas, Monaco, monospace;
            font-weight: 700;
            max-width: 54px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ptr-active {
            border: 2px solid var(--primary);
            box-shadow: 0 0 0 4px rgba(59,130,246,0.12);
            transform: translateY(-1px);
        }

        .anim-plus {
            background-color: var(--plus) !important;
            color: white;
        }

        .anim-minus {
            background-color: var(--minus) !important;
            color: #333;
        }

        #output {
            background: #111827;
            color: #5eead4;
            padding: 13px 14px;
            border-radius: 14px;
            min-height: 44px;
            font-family: Consolas, Monaco, monospace;
            font-size: 13px;
            margin: 14px 0;
            word-break: break-all;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
        }

        .guide-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: white;
            border-radius: 14px;
            overflow: hidden;
            font-size: 12px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        }

        .guide-table th,
        .guide-table td {
            border-bottom: 1px solid #eef0f3;
            padding: 10px;
            text-align: left;
        }

        .guide-table tr:last-child td {
            border-bottom: none;
        }

        .guide-table th {
            background: #f8fafc;
            color: #64748b;
            font-size: 11px;
        }

        code {
            background: #f1f5f9;
            padding: 2px 5px;
            border-radius: 5px;
            color: #d63384;
            font-family: Consolas, Monaco, monospace;
        }

        @media (max-width: 640px) {
            body {
                padding: 14px 10px;
            }

            .topbar {
                align-items: flex-start;
            }

            .title b {
                font-size: 1.15rem;
            }

            .controls {
                align-items: stretch;
            }

            .input-group {
                width: 100%;
                justify-content: space-between;
            }

            button {
                width: 100%;
            }

            .btn-seek {
                width: 100%;
            }

            .cell {
                width: 56px;
                height: 56px;
            }
        }
    </style>
</head>
<body>

<main class="app">

    <div class="topbar">
        <div class="title">
            <b>Brainfuck 操作可视化</b>
            <span class="subtitle">逐步执行、内存变化与输出结果可视化</span>
        </div>
        <span id="status">等待</span>
    </div>

    <div class="box">
        <textarea id="editor" oninput="updateCharCount()">>+>+++++[<[<++>-]<[>++<-]>>-]<.</textarea>
        <div id="display"></div>
        <div id="info">字符数: 24</div>
    </div>

    <div class="box">
        <div class="controls">
            <div class="input-group">
                间隔(s):
                <input type="number" id="speed" value="0.1" step="0.1" style="width:60px">
            </div>
            <button class="btn-run" id="runBtn" onclick="handleRun()">开始运行 ▶</button>
            <button class="btn-reset" onclick="resetAll()">重置</button>
        </div>

        <div class="seek-area">
            <div class="seek-title">跳转：未检测到对应值或单元格留空则快进</div>
            <div class="controls">
                <div class="input-group">
                    单元格 #
                    <input type="number" id="seekIdx" value="1" style="width:60px">
                </div>
                <div class="input-group">
                    目标值:
                    <input type="text" id="seekVal" placeholder="留空则只检测变化" style="width:140px">
                </div>
                <button class="btn-seek" onclick="fastSeek()">执行跳转</button>
            </div>
        </div>
    </div>

    <div class="section-title">内存可视化</div>
    <div class="memory-grid" id="memory"></div>

    <div id="output">等待输出...</div>

    <div class="section-title">指令列表</div>
    <table class="guide-table">
        <thead>
            <tr>
                <th>符号</th>
                <th>功能</th>
                <th>说明</th>
            </tr>
        </thead>
        <tbody>
            <tr><td><code>+</code></td><td>数值+1</td><td>当前单元格(内存格)+1并<span style="color:var(--plus)">变绿</span>。</td></tr>
            <tr><td><code>-</code></td><td>数值-1</td><td>当前单元格-1并<span style="color:var(--minus)">变黄</span>。</td></tr>
            <tr><td><code>&gt;</code></td><td>指针左移</td><td>单元格左移一格。</td></tr>
            <tr><td><code>&lt;</code></td><td>指针右移</td><td>单元格右移一格。</td></tr>
            <tr><td><code>[</code></td><td>循环开始</td><td>如果当前单元格数值为0，跳转至对应的<code>]</code>之后。</td></tr>
            <tr><td><code>]</code></td><td>循环结束</td><td>如果当前单元格数值不为0，跳回对应的<code>[</code>处。</td></tr>
            <tr><td><code>.</code></td><td>输出</td><td>直接输出当前单元格的十进制数值。</td></tr>
        </tbody>
    </table>

</main>

<script>
    let cells = [0n];
    let ptr = 0, pc = 0;
    let jumps = {};
    let isRunning = false, isSeeking = false, stopFlag = false;

    function updateCharCount() {
        document.getElementById('info').innerText = '字符数: ' + document.getElementById('editor').value.length;
    }

    function resetAll() {
        stopFlag = true; isRunning = false; isSeeking = false;
        pc = 0; ptr = 0; cells = [0n];
        document.getElementById('editor').style.display = 'block';
        document.getElementById('display').style.display = 'none';
        document.getElementById('runBtn').innerText = '开始运行 ▶';
        document.getElementById('status').innerText = '已重置';
        renderMemory();
        document.getElementById('output').innerText = '...';
    }

    function initVM() {
        const code = document.getElementById('editor').value;
        const display = document.getElementById('display');
        display.innerHTML = '';
        code.split('').forEach(char => {
            const span = document.createElement('span');
            span.className = 'char'; span.innerText = char;
            display.appendChild(span);
        });
        document.getElementById('editor').style.display = 'none';
        display.style.display = 'block';

        let stack = []; jumps = {};
        for(let i=0; i<code.length; i++) {
            if(code[i] === '[') stack.push(i);
            if(code[i] === ']') { let s = stack.pop(); if(s !== undefined) { jumps[s] = i; jumps[i] = s; } }
        }
    }

    function executeStep(code) {
        if (pc >= code.length) return null;
        const cmd = code[pc];
        let type = null;
        switch(cmd) {
            case '>': ptr++; if(ptr >= cells.length) cells.push(0n); break;
            case '<': ptr = Math.max(0, ptr - 1); break;
            case '+': cells[ptr]++; type = 'plus'; break;
            case '-': cells[ptr]--; type = 'minus'; break;
            case '.': document.getElementById('output').innerText += cells[ptr].toString() + " "; break;
            case '[': if(cells[ptr] === 0n) { pc = jumps[pc]; } break;
            case ']': if(cells[ptr] !== 0n) { pc = jumps[pc]; return null; } break;
        }
        pc++;
        return type;
    }

    function renderMemory(activeIdx = -1, type = '') {
        const container = document.getElementById('memory');
        container.innerHTML = '';
        cells.forEach((val, i) => {
            const div = document.createElement('div');
            div.className = `cell ${i === ptr ? 'ptr-active' : ''}`;
            if (i === activeIdx) div.classList.add(type === 'plus' ? 'anim-plus' : 'anim-minus');
            div.innerHTML = `<div class="cell-idx">#${i}</div><div class="cell-val">${val}</div>`;
            container.appendChild(div);
        });
    }

    async function handleRun() {
        if (isRunning) { stopFlag = true; return; }
        if (pc === 0) initVM();
        isRunning = true; stopFlag = false;
        document.getElementById('runBtn').innerText = '暂停 ||';
        document.getElementById('status').innerText = '执行中...';
        const code = document.getElementById('editor').value;

        while(pc < code.length && !stopFlag) {
            const delay = Math.max(parseFloat(document.getElementById('speed').value), 0.001) * 1000;
            const spans = document.getElementById('display').querySelectorAll('.char');
            spans.forEach((s, i) => s.className = (i === pc) ? 'char active-char' : 'char');

            let type = executeStep(code);
            renderMemory(type ? ptr : -1, type);
            await new Promise(res => setTimeout(res, delay));
        }
        isRunning = false;
        document.getElementById('runBtn').innerText = pc >= code.length ? '执行完毕' : '继续运行 ▶';
        document.getElementById('status').innerText = pc >= code.length ? '完成' : '已暂停';
    }

    async function fastSeek() {
        if (isSeeking) return;
        const code = document.getElementById('editor').value;
        if (pc === 0) initVM();
        const targetIdx = parseInt(document.getElementById('seekIdx').value);
        const targetValStr = document.getElementById('seekVal').value;
        const targetVal = targetValStr !== "" ? BigInt(targetValStr) : null;

        stopFlag = true; isSeeking = true;
        document.getElementById('status').innerText = '快进中...';
        const startTime = performance.now();
        let steps = 0;
        const initialVal = cells[targetIdx] || 0n;

        await new Promise(res => setTimeout(res, 50));
        while (performance.now() - startTime < 1000 && pc < code.length) {
            executeStep(code);
            steps++;
            let cur = cells[targetIdx] || 0n;
            if (targetVal !== null) { if (cur === targetVal) break; }
            else if (cur !== initialVal) break;
            if (steps % 10000 === 0) await new Promise(res => setTimeout(res, 0));
        }
        isSeeking = false; isRunning = false;
        document.getElementById('runBtn').innerText = '继续运行 ▶';
        document.getElementById('status').innerText = `快进结束 (${steps}步)`;
        const spans = document.getElementById('display').querySelectorAll('.char');
        spans.forEach((s, i) => s.className = (i === pc) ? 'char active-char' : 'char');
        renderMemory();
    }

    renderMemory();
</script>

</body>
</html>
